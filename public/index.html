<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Nutricionista Personal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0ede8;
    --text2: #8a877f;
    --text3: #555;
    --green: #4ade80;
    --green-dim: #1a3326;
    --red: #f87171;
    --red-dim: #2d1a1a;
    --amber: #fbbf24;
    --amber-dim: #2d2410;
    --blue: #60a5fa;
    --blue-dim: #1a2a3d;
    --accent: #e8e0d0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }
  .container { width: 100%; max-width: 540px; }

  .top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; }
  .logo { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; }
  .logo span { color: var(--green); }
  .profile-chip { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; background: var(--surface); border: 1px solid var(--border); padding: 5px 10px; border-radius: 20px; }

  .stats-area { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; }
  .ring-wrap { position: relative; width: 120px; height: 120px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-center .rc-val { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; line-height: 1; }
  .ring-center .rc-label { font-size: 10px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.08em; }
  .side-stats { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
  .stat-row .s-label { font-size: 12px; color: var(--text2); }
  .stat-row .s-val { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }
  .s-val.green { color: var(--green); }
  .s-val.red { color: var(--red); }
  .s-val.amber { color: var(--amber); }

  .section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .meals-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; min-height: 40px; }
  .empty-state { font-size: 13px; color: var(--text3); text-align: center; padding: 16px; border: 1px dashed var(--border); border-radius: 8px; }
  .meal-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .meal-item.activity { background: var(--green-dim); border-color: #2a4a36; }
  .m-icon { font-size: 15px; width: 22px; text-align: center; }
  .m-type { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.05em; width: 62px; flex-shrink: 0; }
  .m-desc { flex: 1; font-size: 13px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .m-kcal { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; white-space: nowrap; }
  .meal-item.activity .m-kcal { color: var(--green); }
  .m-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; line-height: 1; padding: 0 2px; }
  .m-del:hover { color: var(--red); }

  .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 1.25rem; }
  .type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
  .type-btn { padding: 7px 6px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text2); cursor: pointer; text-align: center; transition: all 0.15s; }
  .type-btn:hover { border-color: var(--border2); color: var(--text); }
  .type-btn.active { border-color: var(--accent); color: var(--accent); background: #1e1e1e; }
  .inp-row { display: flex; gap: 8px; }
  .food-inp { flex: 1; font-size: 14px; padding: 10px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; }
  .food-inp::placeholder { color: var(--text3); }
  .food-inp:focus { outline: none; border-color: var(--border2); }
  .send-btn { padding: 10px 16px; background: var(--accent); color: #111; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .feedback { display: none; border-left: 2px solid var(--blue); background: var(--blue-dim); border-radius: 0 8px 8px 0; padding: 10px 13px; margin-bottom: 1.25rem; font-size: 13px; line-height: 1.6; }
  .feedback strong { color: var(--blue); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.05em; display: block; margin-bottom: 4px; }
  .fb-tip { color: var(--text2); margin-top: 6px; font-size: 12px; }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .act-btn { padding: 8px 14px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .act-btn:hover { border-color: var(--border2); color: var(--text); }
  .act-btn.danger { color: var(--red); border-color: #3a2020; }
  .act-btn.danger:hover { background: var(--red-dim); }

  .weight-card { border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 1.5rem; }
  .weight-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .w-target { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .w-inp-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .w-inp { font-size: 14px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); width: 140px; font-family: 'DM Mono', monospace; }
  .w-inp:focus { outline: none; border-color: var(--border2); }
  .w-save-btn { padding: 8px 14px; background: var(--green); color: #000; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .w-history { display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto; }
  .w-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .w-row:last-child { border-bottom: none; }
  .w-date { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; }
  .w-kg { font-family: 'DM Mono', monospace; font-weight: 500; }
  .w-diff { font-size: 11px; font-family: 'DM Mono', monospace; }
  .w-diff.up { color: var(--red); }
  .w-diff.dn { color: var(--green); }
  .w-left { font-size: 11px; color: var(--text3); }

  .summary-card { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 1.5rem; }
  .summary-card .s-title { font-size: 10px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .summary-card .s-body { font-size: 14px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; }

  .thinking { font-size: 13px; color: var(--text3); padding: 10px 0; text-align: center; display: none; }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .progress-bar { background: var(--surface); border-radius: 999px; height: 6px; margin-bottom: 2rem; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; background: var(--green); transition: width 0.5s ease; }
  .progress-fill.warn { background: var(--amber); }
  .progress-fill.over { background: var(--red); }
</style>
</head>
<body>
<div class="container">

  <div class="top">
    <div>
      <div class="logo">Mi <span>Nutricionista</span></div>
      <div style="font-size:20px; font-weight:300; margin-top:4px; letter-spacing:-0.02em;">Personal</div>
    </div>
    <div class="profile-chip">♂ 49a · 182cm · 108→87kg</div>
  </div>

  <div class="stats-area">
    <div class="ring-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#222" stroke-width="10"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="#4ade80" stroke-width="10"
          stroke-dasharray="314" stroke-dashoffset="314" id="ring-circle"
          stroke-linecap="round" style="transition: stroke-dashoffset 0.5s ease;"/>
      </svg>
      <div class="ring-center">
        <div class="rc-val" id="ring-pct">0%</div>
        <div class="rc-label">del día</div>
      </div>
    </div>
    <div class="side-stats">
      <div class="stat-row">
        <span class="s-label">Consumido</span>
        <span class="s-val" id="s-consumed">0 kcal</span>
      </div>
      <div class="stat-row">
        <span class="s-label">Restante</span>
        <span class="s-val green" id="s-remaining">2.000 kcal</span>
      </div>
      <div class="stat-row">
        <span class="s-label">Quemado</span>
        <span class="s-val green" id="s-burned">0 kcal</span>
      </div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="prog" style="width:0%"></div>
  </div>

  <div class="section-label">Registro del día</div>
  <div class="meals-list" id="meals-list">
    <div class="empty-state">Nada registrado aún hoy.</div>
  </div>

  <div class="feedback" id="feedback-box">
    <strong id="fb-header"></strong>
    <span id="fb-numbers"></span>
    <div class="fb-tip" id="fb-tip"></div>
  </div>
  <div class="thinking" id="thinking"><span class="spin"></span>Calculando calorías...</div>

  <div class="input-card">
    <div class="type-grid">
      <button class="type-btn active" data-type="Desayuno" onclick="setType(this)">☀️ Desayuno</button>
      <button class="type-btn" data-type="Comida" onclick="setType(this)">🍽️ Comida</button>
      <button class="type-btn" data-type="Merienda" onclick="setType(this)">🍎 Merienda</button>
      <button class="type-btn" data-type="Cena" onclick="setType(this)">🌙 Cena</button>
      <button class="type-btn" data-type="Snack" onclick="setType(this)">🧁 Snack</button>
      <button class="type-btn" data-type="Actividad" onclick="setType(this)">🏃 Actividad</button>
    </div>
    <div class="inp-row">
      <input class="food-inp" id="food-inp" type="text" placeholder="Ej: 2 huevos revueltos, tostada, café con leche" />
      <button class="send-btn" id="send-btn" onclick="analyze()">Calcular</button>
    </div>
  </div>

  <div class="actions">
    <button class="act-btn danger" onclick="closeDay()">Cierre del día</button>
    <button class="act-btn" onclick="newDay()">Nuevo día</button>
    <button class="act-btn" onclick="toggleWeightInp()">+ Peso</button>
  </div>

  <div class="weight-card">
    <div class="weight-header">
      <div class="section-label" style="margin:0">Seguimiento de peso</div>
      <div class="w-target">Objetivo: 87 kg</div>
    </div>
    <div class="w-inp-row" id="w-inp-row" style="display:none">
      <input class="w-inp" id="w-inp" type="number" step="0.1" placeholder="108.0" />
      <button class="w-save-btn" onclick="saveWeight()">Guardar</button>
    </div>
    <div class="w-history" id="w-history">
      <div style="font-size:13px;color:var(--text3)">Sin registros aún.</div>
    </div>
  </div>

  <div class="summary-card" id="summary-card">
    <div class="s-title">Resumen del día</div>
    <div class="s-body" id="summary-body"></div>
  </div>

</div>
<script>
const GOAL = 2000;
const ICONS = { Desayuno:'☀️', Comida:'🍽️', Merienda:'🍎', Cena:'🌙', Snack:'🧁', Actividad:'🏃' };
let selectedType = 'Desayuno';

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('nutri_v3') || 'null');
    const today = new Date().toDateString();
    if (s && s.date === today) return s;
    return { date: today, meals: [], weights: s ? (s.weights || []) : [] };
  } catch(e) { return { date: new Date().toDateString(), meals: [], weights: [] }; }
}
function saveState() { try { localStorage.setItem('nutri_v3', JSON.stringify(state)); } catch(e) {} }
let state = loadState();

function totals() {
  const consumed = state.meals.filter(m=>m.type!=='Actividad').reduce((s,m)=>s+m.kcal,0);
  const burned   = state.meals.filter(m=>m.type==='Actividad').reduce((s,m)=>s+m.kcal,0);
  const net = consumed - burned;
  return { consumed, burned, net, remaining: GOAL - net };
}

function render() {
  const t = totals();
  document.getElementById('s-consumed').textContent  = t.consumed.toLocaleString('es-ES') + ' kcal';
  document.getElementById('s-burned').textContent    = t.burned.toLocaleString('es-ES') + ' kcal';
  const remEl = document.getElementById('s-remaining');
  remEl.textContent = t.remaining.toLocaleString('es-ES') + ' kcal';
  remEl.className = 's-val ' + (t.remaining < 0 ? 'red' : t.remaining < 300 ? 'amber' : 'green');

  const pct = Math.max(0, Math.min(100, (t.net / GOAL) * 100));
  const circ = 2 * Math.PI * 50;
  const ring = document.getElementById('ring-circle');
  ring.style.strokeDashoffset = circ - (pct / 100) * circ;
  ring.style.stroke = pct >= 100 ? '#f87171' : pct >= 80 ? '#fbbf24' : '#4ade80';
  document.getElementById('ring-pct').textContent = Math.round(pct) + '%';

  const prog = document.getElementById('prog');
  prog.style.width = pct + '%';
  prog.className = 'progress-fill' + (pct >= 100 ? ' over' : pct >= 80 ? ' warn' : '');

  const list = document.getElementById('meals-list');
  if (!state.meals.length) {
    list.innerHTML = '<div class="empty-state">Nada registrado aún hoy.</div>';
  } else {
    list.innerHTML = state.meals.map((m,i) => `
      <div class="meal-item${m.type==='Actividad'?' activity':''}">
        <span class="m-icon">${ICONS[m.type]||'🍴'}</span>
        <span class="m-type">${m.type.toUpperCase()}</span>
        <span class="m-desc" title="${m.desc}">${m.desc}</span>
        <span class="m-kcal">${m.type==='Actividad'?'−':''}${m.kcal} kcal</span>
        <button class="m-del" onclick="removeMeal(${i})">×</button>
      </div>`).join('');
  }
  renderWeights();
}

function renderWeights() {
  const el = document.getElementById('w-history');
  if (!state.weights || !state.weights.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--text3)">Sin registros aún.</div>'; return;
  }
  const sorted = [...state.weights].sort((a,b)=>new Date(b.rawDate)-new Date(a.rawDate));
  el.innerHTML = sorted.map((w,i)=>{
    const prev = sorted[i+1];
    let diffHtml = '';
    if (prev) {
      const d = (w.weight - prev.weight).toFixed(1);
      diffHtml = `<span class="w-diff ${d > 0 ? 'up' : 'dn'}">${d>0?'+':''}${d} kg</span>`;
    }
    const left = (w.weight - 87).toFixed(1);
    return `<div class="w-row">
      <span class="w-date">${w.date}</span>
      <span class="w-kg">${w.weight} kg</span>
      ${diffHtml}
      <span class="w-left">${left > 0 ? 'Faltan '+left+' kg' : '🎯 Meta'}</span>
    </div>`;
  }).join('');
}

function removeMeal(i) { state.meals.splice(i,1); saveState(); render(); }

function setType(btn) {
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.type;
  document.getElementById('food-inp').placeholder =
    selectedType === 'Actividad' ? 'Ej: 30 min caminata rápida, 1h bici estática' : 'Ej: 2 huevos revueltos, tostada, café con leche';
}

// Llama a /api/chat (proxy serverless), nunca directamente a Anthropic
async function callAI(system, userMsg) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      system,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || data.error);
  return data.content.map(c=>c.text||'').join('');
}

async function analyze() {
  const desc = document.getElementById('food-inp').value.trim();
  if (!desc) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('thinking').style.display = 'block';
  document.getElementById('feedback-box').style.display = 'none';

  const t = totals();
  const isActivity = selectedType === 'Actividad';
  const sys = isActivity
    ? `Eres un nutricionista. Calcula calorías quemadas. Perfil: hombre 49 años, 182cm, 108kg. Responde SOLO JSON sin markdown: {"kcal": número, "feedback": "1 frase directa y útil"}`
    : `Eres un nutricionista experto. Calcula kcal totales. Responde SOLO JSON sin markdown: {"kcal": número, "feedback": "1 frase útil y directa para adelgazar"}`;
  const msg = isActivity
    ? `Actividad: ${desc}`
    : `${selectedType}: ${desc}. Total acumulado hoy: ${t.consumed} kcal. Restante: ${t.remaining} kcal.`;

  try {
    const raw = (await callAI(sys, msg)).replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);
    const kcal = Math.round(parsed.kcal);
    state.meals.push({ type: selectedType, desc, kcal });
    saveState();

    const nt = totals();
    const fb = document.getElementById('feedback-box');
    fb.style.display = 'block';
    document.getElementById('fb-header').textContent = `${ICONS[selectedType]} ${selectedType}`;
    document.getElementById('fb-numbers').innerHTML =
      `<strong>${isActivity?'−':'+'}${kcal} kcal</strong> &nbsp;·&nbsp; Total: <strong>${nt.consumed} kcal</strong> &nbsp;·&nbsp; Restante: <strong>${nt.remaining} kcal</strong>`;
    document.getElementById('fb-tip').textContent = parsed.feedback;
    document.getElementById('food-inp').value = '';
    render();
  } catch(e) {
    alert('Error: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Calcular';
  document.getElementById('thinking').style.display = 'none';
}

document.getElementById('food-inp').addEventListener('keydown', e => { if(e.key==='Enter') analyze(); });

async function closeDay() {
  const t = totals();
  if (!state.meals.length) { alert('No hay nada registrado hoy.'); return; }
  const card = document.getElementById('summary-card');
  const body = document.getElementById('summary-body');
  card.style.display = 'block';
  body.textContent = 'Generando resumen...';
  card.scrollIntoView({ behavior: 'smooth' });
  const lines = state.meals.map(m=>`${m.type}: ${m.desc} (${m.kcal} kcal)`).join(', ');
  try {
    const text = await callAI(
      'Eres un nutricionista directo y motivador. Resumen del día en 4-5 líneas: total vs objetivo, balance, 1 consejo para mañana. Usa emojis. Sin markdown.',
      `Objetivo: 2000 kcal. Consumido: ${t.consumed}. Quemado: ${t.burned}. Neto: ${t.net}. Comidas: ${lines}`
    );
    body.textContent = text;
  } catch(e) { body.textContent = 'Error al generar resumen.'; }
}

function newDay() {
  if (!confirm('¿Resetear el día?')) return;
  state.meals = []; state.date = new Date().toDateString();
  saveState();
  document.getElementById('feedback-box').style.display = 'none';
  document.getElementById('summary-card').style.display = 'none';
  render();
}

function toggleWeightInp() {
  const el = document.getElementById('w-inp-row');
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

function saveWeight() {
  const val = parseFloat(document.getElementById('w-inp').value);
  if (isNaN(val)||val<40||val>300) { alert('Peso inválido'); return; }
  if (!state.weights) state.weights = [];
  const now = new Date();
  const dateStr = now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  const idx = state.weights.findIndex(w=>w.date===dateStr);
  const entry = { date: dateStr, rawDate: now.toISOString(), weight: val };
  if (idx>=0) state.weights[idx]=entry; else state.weights.push(entry);
  document.getElementById('w-inp').value='';
  document.getElementById('w-inp-row').style.display='none';
  saveState(); render();
}

render();
</script>
</body>
</html>
